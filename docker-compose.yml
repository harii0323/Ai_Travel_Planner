version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: travel-planner-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db
      - ./backup-database.sh:/backup-database.sh

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: travel-planner-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/ai-travel-planner?authSource=admin
      JWT_SECRET: supersecretkeyforlocaldev
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app/backend  # For dev hot reload

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: travel-planner-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:

